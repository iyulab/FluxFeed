name: Publish
on:
  push:
    branches: [main]
    paths: ['Directory.Build.props']
  workflow_dispatch:
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore FluxFeed.slnx
      - run: dotnet build FluxFeed.slnx --configuration Release --no-restore
      - run: dotnet test FluxFeed.slnx --configuration Release --no-build --filter "Category!=Integration"
      - run: dotnet pack FluxFeed.slnx --configuration Release --no-build --output ./artifacts
      - run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
