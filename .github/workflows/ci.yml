name: CI
on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', '**/*.props', '**/*.slnx', '.github/workflows/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore FluxFeed.slnx
      - run: dotnet build FluxFeed.slnx --configuration Release --no-restore
      - run: dotnet test FluxFeed.slnx --configuration Release --no-build --filter "Category!=Integration"
